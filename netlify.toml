[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/summer-hua/apply"
  to = "/consult/?intent=summer&source=summer_apply_redirect"
  status = 301

[[redirects]]
  from = "/summer-hua/apply/*"
  to = "/consult/?intent=summer&source=summer_apply_redirect"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/consult/?source=contact_redirect"
  status = 301

[[redirects]]
  from = "/contact/*"
  to = "/consult/?source=contact_redirect"
  status = 301

[[redirects]]
  from = "/camps/act-demo-001"
  to = "/camps/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/#paths"
  status = 301

[[redirects]]
  from = "/articles/index.html"
  to = "/articles/"
  status = 301

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
